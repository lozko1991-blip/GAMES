<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lozko Games Hub</title>
    <!-- Auto-redirect to penalty master as the primary game -->
    <meta http-equiv="refresh" content="0; url=./penalty-master/index.html">
    <style>
        body {
            margin: 0;
            background: #0a0a16;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .loader {
            border: 3px solid rgba(0, 255, 204, 0.1);
            border-radius: 50%;
            border-top: 3px solid #00ffcc;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h2>Завантаження Penalty Master...</h2>
        <p style="color: #666; font-size: 0.9rem;">Якщо перенаправлення не відбулося автоматично, <a href="./penalty-master/index.html" style="color: #00ffcc; text-decoration: none;">натисніть сюди</a>.</p>
    </div>
